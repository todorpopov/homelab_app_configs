# Dashboard chart is deployed through the following commands:
#   helm repo add kubernetes-dashboard https://kubernetes.github.io/dashboard/
#   helm repo update

#   helm upgrade --install kubernetes-dashboard kubernetes-dashboard/kubernetes-dashboard --namespace kubernetes-dashboard --create-namespace


# To get the Token Bearer run the following command:
  # kubectl -n kubernetes-dashboard create token admin-user


apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kubernetes-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: admin-user
  namespace: kubernetes-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-dashboard-nodeport
  namespace: kubernetes-dashboard
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: kubernetes-dashboard
  ports:
    - protocol: TCP
      port: 8443
      targetPort: 8443
      nodePort: 30005
