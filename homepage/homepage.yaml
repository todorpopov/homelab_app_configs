---
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    layout:
      - Kubernetes Resources:
          style: row
          columns: 3
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Access:
        - TailScale:
            href: https://login.tailscale.com/admin/machines
            description: Manage TailScale devices
        - Kubernetes Dashboard:
            href: https://infra:30005/#/workloads?namespace=default
            description: View and manage Kubernetes resources
            ping: http://infra:30005
        - Registry:
            href: http://infra:30501
            description: In-cluster Docker registry
            ping: http://infra:30501
        - RabbitMQ Management:
            href: http://infra:30004/#/
            description: Manage RabbitMQ
            ping: http://infra:30004
            username: admin
            password: admin

    - My Second Group:
        - My Second Service:
            href: http://localhost/
            description: Homepage is the best

    - My Third Group:
        - My Third Service:
            href: http://localhost/
            description: Homepage is 😎
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: false
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - nodes/stats
    verbs:
      - get
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homepage-config-pvc
  namespace: homepage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "*"
        - name: TZ
          value: "UTC"
        - name: HOMEPAGE_VAR_TITLE
          value: "Homepage"
        - name: LOG_TARGETS
          value: "stdout"
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: homepage-config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: homepage-config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: homepage-config
          mountPath: /app/config/bookmarks.yaml
          subPath: bookmarks.yaml
        - name: homepage-config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: homepage-config
          mountPath: /app/config/kubernetes.yaml
          subPath: kubernetes.yaml
        - name: homepage-config
          mountPath: /app/config/docker.yaml
          subPath: docker.yaml
        - name: homepage-config
          mountPath: /app/config/custom.css
          subPath: custom.css
        - name: homepage-config
          mountPath: /app/config/custom.js
          subPath: custom.js
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: homepage-config-pvc
      - name: homepage-config
        configMap:
          name: homepage
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  type: NodePort
  selector:
    app: homepage
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    nodePort: 30006
    protocol: TCP
